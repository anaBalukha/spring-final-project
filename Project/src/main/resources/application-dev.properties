# ============================================================
# DEV profile - local development: in-memory H2 + test data
# ============================================================

# In-memory H2 database (recreated on every start, seeded by DevDataSeeder)
spring.datasource.url=jdbc:h2:mem:homework_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Browser console for inspecting the in-memory DB: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Custom settings overridden for development ----
app.settings.title=Student-Course Management API (DEV)
app.settings.show-environment-info=true

# ---- Actuator: full health detail in development ----
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
