# ============================================================
# PROD profile - persistent PostgreSQL, strict settings
# ============================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homework_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Never auto-drop in production; only evolve the schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# No H2 console in production
spring.h2.console.enabled=false

# ---- Custom settings overridden for production ----
app.settings.show-environment-info=false

# ---- Actuator: never leak internal health details publicly in production ----
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
