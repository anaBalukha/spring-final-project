# ============================================================
# Common settings (shared by every profile)
# ============================================================
spring.application.name=Homework

# If no profile is supplied, run as "dev" (H2, test data, verbose logging)
spring.profiles.default=dev

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# i18n message bundles (UTF-8 encoded)
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ---- Custom application settings (bound to AppSettingsProperties) ----
app.settings.title=Student-Course Management API
app.settings.contact-email=nikoloztuxa@gmail.com
app.settings.show-environment-info=false

# ============================================================
# Actuator (monitoring) — endpoint access rules live in SecurityConfig
# ============================================================
# Only health, info and metrics are exposed over HTTP (least exposure)
management.endpoints.web.exposure.include=health,info,metrics
# Health details are shown only to authenticated users (overridden to "always" in dev)
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Enable the info contributors that build the /actuator/info payload
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.build.enabled=true

# Static metadata surfaced by the "env" info contributor at /actuator/info
info.app.name=${spring.application.name}
info.app.description=REST API for managing students and their enrolled courses
info.app.version=1.0
info.app.encoding=UTF-8
